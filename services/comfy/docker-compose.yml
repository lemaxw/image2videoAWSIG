services:
  comfyui:
    build:
      context: ../..
      dockerfile: services/comfy/Dockerfile
    image: pipeline-comfyui-local
    container_name: pipeline-comfyui
    restart: unless-stopped
    command: ["python", "main.py", "--listen", "0.0.0.0", "--port", "8188", "--output-directory", "/data/outputs/comfy", "--cpu"]
    ports:
      - "127.0.0.1:8188:8188"
    volumes:
      - ${MODEL_DIR:-/data/models}:/opt/ComfyUI/models      
      - ${OUTPUT_DIR:-/data/outputs}:/data/outputs
      - shared_inputs:/data/inputs
      - ./workflow_templates:/app/workflow_templates:ro
      - ./scripts:/app/scripts:ro
    healthcheck:
      test: ["CMD", "bash", "/app/workflow_templates/../scripts/healthcheck_comfy.sh"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 90s

  audio:
    build:
      context: ../..
      dockerfile: services/audio/Dockerfile
    container_name: pipeline-audio
    restart: unless-stopped
    environment:
      - AUDIO_CACHE_DIR=/cache
      - AUDIO_MODEL_BACKEND=${AUDIO_MODEL_BACKEND:-tangoflux}
      - AUDIO_DEVICE=${AUDIO_DEVICE:-cpu}
      - AUDIO_INFERENCE_STEPS=${AUDIO_INFERENCE_STEPS:-60}
      - AUDIO_GUIDANCE_SCALE=${AUDIO_GUIDANCE_SCALE:-3.5}
      - AUDIO_NUM_SAMPLES=${AUDIO_NUM_SAMPLES:-3}
      - AUDIO_SEED_BASE=${AUDIO_SEED_BASE:-42}
      - AUDIO_TARGET_LUFS=${AUDIO_TARGET_LUFS:--14}
      - AUDIO_TRUE_PEAK_DB=${AUDIO_TRUE_PEAK_DB:--1.0}
      - AUDIO_BASS_GAIN_DB=${AUDIO_BASS_GAIN_DB:-0}
      - AUDIO_STEREO_MLEV=${AUDIO_STEREO_MLEV:-0}
      - AUDIO_REVERB_DELAY_MS=${AUDIO_REVERB_DELAY_MS:-700}
      - AUDIO_REVERB_DECAY=${AUDIO_REVERB_DECAY:-0.08}
      - TANGOFLUX_MODEL=${TANGOFLUX_MODEL:-declare-lab/TangoFlux}
      - TANGOFLUX_STEPS=${TANGOFLUX_STEPS:-50}
      - TANGOFLUX_GUIDANCE_SCALE=${TANGOFLUX_GUIDANCE_SCALE:-4.5}
      - HF_HUB_DISABLE_XET=${HF_HUB_DISABLE_XET:-1}
      - AUDIO_REQUEST_TIMEOUT_S=${AUDIO_REQUEST_TIMEOUT_S:-900}
    volumes:
      - ../audio/audio_service.py:/app/audio_service.py:ro
      - ${AUDIO_CACHE_DIR:-/data/audio-cache}:/cache
      - ${OUTPUT_DIR:-/data/outputs}:/data/outputs
    ports:
      - "127.0.0.1:${AUDIO_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 20

  orchestrator:
    build:
      context: ../..
      dockerfile: services/orchestrator/Dockerfile
    container_name: pipeline-orchestrator
    restart: unless-stopped
    command: ["tail", "-f", "/dev/null"]
    environment:
      - COMFY_URL=http://comfyui:8188
      - AUDIO_URL=http://audio:8000
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.4-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - IMAGE2JSON_ENABLED=${IMAGE2JSON_ENABLED:-true}
      - IMAGE2JSON_URL=${IMAGE2JSON_URL:-http://host.docker.internal:11434}
      - IMAGE2JSON_MODEL=${IMAGE2JSON_MODEL:-qwen3-vl:8b}
      - IMAGE2JSON_TEXT_MODEL=${IMAGE2JSON_TEXT_MODEL:-qwen3:14b}
      - IMAGE2JSON_TIMEOUT=${IMAGE2JSON_TIMEOUT:-300}
      - MODEL_SERVICE_CONTROL=${MODEL_SERVICE_CONTROL:-docker}
      - AUDIO_CONTAINER_NAME=${AUDIO_CONTAINER_NAME:-pipeline-audio}
      - COMFY_CONTAINER_NAME=${COMFY_CONTAINER_NAME:-pipeline-comfyui}
      - OUTPUT_DIR=/data/outputs
      - INPUT_DIR=/data/inputs
      - PYTHONPATH=/app:/app/image2json/src
    volumes:
      - ../..:/app
      - /home/lemaxw/hobby/image2json:/app/image2json:ro
      - ${OUTPUT_DIR:-/data/outputs}:/data/outputs
      - ${MODEL_DIR:-/data/models}:/data/models
      - shared_inputs:/data/inputs
      - ${LOCAL_INPUT_DIR:-/tmp/local_inputs}:/data/local_inputs
      - ${LOCAL_OUTPUT_DIR:-/tmp/local_outputs}:/data/local_outputs
      - /tmp:/tmp
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      comfyui:
        condition: service_started
      audio:
        condition: service_healthy

volumes:
  shared_inputs:
