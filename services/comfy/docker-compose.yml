services:
  comfyui:
    build:
      context: ../..
      dockerfile: services/comfy/Dockerfile
    image: pipeline-comfyui-local
    container_name: pipeline-comfyui
    restart: unless-stopped
    command: ["python", "main.py", "--listen", "0.0.0.0", "--port", "8188", "--output-directory", "/data/outputs/comfy", "--cpu"]
    ports:
      - "127.0.0.1:8188:8188"
    volumes:
      - ${MODEL_DIR:-/data/models}:/opt/ComfyUI/models      
      - ${OUTPUT_DIR:-/data/outputs}:/data/outputs
      - shared_inputs:/data/inputs
      - ./workflow_templates:/app/workflow_templates:ro
      - ./scripts:/app/scripts:ro
    healthcheck:
      test: ["CMD", "bash", "/app/workflow_templates/../scripts/healthcheck_comfy.sh"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 90s

  audio:
    build:
      context: ../..
      dockerfile: services/audio/Dockerfile
    container_name: pipeline-audio
    restart: unless-stopped
    environment:
      - AUDIO_CACHE_DIR=/cache
      - AUDIO_MODEL_BACKEND=${AUDIO_MODEL_BACKEND:-mock}
      - AUDIO_DEVICE=${AUDIO_DEVICE:-cpu}
    volumes:
      - ../audio/audio_service.py:/app/audio_service.py:ro
      - ${AUDIO_CACHE_DIR:-/data/audio-cache}:/cache
      - ${OUTPUT_DIR:-/data/outputs}:/data/outputs
    ports:
      - "127.0.0.1:${AUDIO_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 20

  orchestrator:
    build:
      context: ../..
      dockerfile: services/orchestrator/Dockerfile
    container_name: pipeline-orchestrator
    restart: unless-stopped
    command: ["tail", "-f", "/dev/null"]
    environment:
      - COMFY_URL=http://comfyui:8188
      - AUDIO_URL=http://audio:8000
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OUTPUT_DIR=/data/outputs
      - INPUT_DIR=/data/inputs
    volumes:
      - ../..:/app
      - ${OUTPUT_DIR:-/data/outputs}:/data/outputs
      - ${MODEL_DIR:-/data/models}:/data/models
      - shared_inputs:/data/inputs
      - ${LOCAL_INPUT_DIR:-/tmp/local_inputs}:/data/local_inputs
      - ${LOCAL_OUTPUT_DIR:-/tmp/local_outputs}:/data/local_outputs
      - /tmp:/tmp
    depends_on:
      comfyui:
        condition: service_started
      audio:
        condition: service_healthy

volumes:
  shared_inputs:
